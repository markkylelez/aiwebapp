<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealJai — Admin Report Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <div class="brand">
            <div class="logo-wrapper">
                <img src="../img/app_icon.png" alt="HealJai Logo" class="main-logo">
            </div>
            <div class="brand-name">Heal<span>Jai</span> Admin</div>
        </div>
        <div class="topbar-right">
            <div class="live-badge"><span class="live-dot"></span> Live</div>
            <span id="last-updated">—</span>
            <button class="btn" onclick="fetchReports()">↻ Refresh</button>
        </div>
    </header>

    <div class="wrap">
        <div class="filters">
            <div class="search-box">
                <span style="color:var(--muted)">⌕</span>
                <input type="text" id="q" placeholder="ค้นหา Report ID..." oninput="renderTable()">
            </div>
            <select id="f-feature" onchange="renderTable()">
                <option value="">ทุกฟีเจอร์</option>
                <option value="Chat">Chat</option>
                <option value="Post">Post</option>
            </select>
            <select id="f-status" onchange="renderTable()">
                <option value="">ทุกสถานะ</option>
                <option value="pending">รอตรวจสอบ</option>
                <option value="resolved">จัดการแล้ว</option>
                <option value="dismissed">ยกเลิก</option>
            </select>
        </div>

        <div class="table-card">
            <div class="table-head">
                <span class="table-title">คิวงานรอดำเนินการ</span>
                <span class="count-badge" id="row-count">0 รายการ</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th style="width: 150px;">วันที่ / เวลา</th>
                        <th style="width: 120px;">ฟีเจอร์</th>
                        <th>ประเภทปัญหา</th>
                        <th style="text-align: right;">การจัดการ</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeDrawer(event)">
        <div class="drawer" onclick="event.stopPropagation()">
            <div class="drawer-head">
                <div style="font-weight:700; font-size:16px">รายละเอียดการรายงาน</div>
                <button class="close-btn" onclick="closeDrawer()">✕</button>
            </div>
            <div class="drawer-body" id="d-body"></div>
        </div>
    </div>

    <div id="toast"><span id="t-icon"></span><span id="t-msg"></span></div>

    <script src="script.js"></script>
</body>
</html>
