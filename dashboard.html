<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealJai — Admin Report Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0b1120;
  --surface:  #111827;
  --card:     #1a2235;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #e2e8f4;
  --muted:    #5a6a85;
  --moon:     #7fd8eb;
  --sun:      #fe9526;
  --red:      #fd7d7e;
  --green:    #34d399;
  --yellow:   #fbbf24;
  --blue:     #60a5fa;
  --font:     'Sarabun', sans-serif;
  --mono:     'IBM Plex Mono', monospace;
}

body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-dot {
  width: 32px; height: 32px; border-radius: 10px;
  background: linear-gradient(135deg, var(--moon), var(--sun));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.brand-name span { color: var(--moon); }
.topbar-right { display: flex; align-items: center; gap: 12px; }

/* live badge */
.live-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--green);
  padding: 4px 10px; border-radius: 20px;
  background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2);
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.btn {
  padding: 7px 16px; border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent; color: var(--text);
  font-family: var(--font); font-size: 13px; cursor: pointer;
  transition: background .15s;
}
.btn:hover { background: var(--card); }
.btn-red { background: rgba(253,125,126,0.15); border-color: rgba(253,125,126,0.3); color: var(--red); }
.btn-red:hover { background: rgba(253,125,126,0.25); }

/* ── Layout ── */
.wrap { max-width: 1200px; margin: 0 auto; padding: 24px 28px; }

/* ── Stats ── */
.stats { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 24px; }
.stat {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
  position: relative; overflow: hidden;
}
.stat::after {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
}
.stat.s-red::after { background: var(--red); }
.stat.s-yellow::after { background: var(--yellow); }
.stat.s-blue::after { background: var(--blue); }
.stat.s-green::after { background: var(--green); }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.stat-val { font-family: var(--mono); font-size: 30px; font-weight: 500; line-height: 1; }
.stat-val.c-red { color: var(--red); }
.stat-val.c-yellow { color: var(--yellow); }
.stat-val.c-blue { color: var(--blue); }
.stat-val.c-green { color: var(--green); }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }

/* ── Filters ── */
.filters {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 8px; padding: 7px 12px;
  flex: 1; min-width: 200px; max-width: 280px;
}
.search-box input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font); font-size: 13px; width: 100%;
}
.search-box input::placeholder { color: var(--muted); }
select {
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 8px; padding: 7px 12px;
  color: var(--text); font-family: var(--font); font-size: 13px;
  outline: none; cursor: pointer;
}
select option { background: #1a2235; }

/* ── Table card ── */
.table-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
}
.table-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
}
.table-title { font-size: 13px; font-weight: 600; }
.count-badge {
  font-size: 11px; padding: 2px 9px; border-radius: 20px;
  background: rgba(253,125,126,0.15); color: var(--red); font-family: var(--mono);
}

table { width: 100%; border-collapse: collapse; }
thead tr { background: rgba(255,255,255,0.02); }
th {
  text-align: left; padding: 11px 16px;
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 13px 16px; border-bottom: 1px solid var(--border);
  font-size: 13px; vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background .12s; }
tbody tr:hover { background: rgba(255,255,255,0.02); }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.b-red    { background: rgba(253,125,126,0.15); color: #fd7d7e; }
.b-yellow { background: rgba(251,191,36,0.15);  color: #fbbf24; }
.b-green  { background: rgba(52,211,153,0.15);  color: #34d399; }
.b-blue   { background: rgba(96,165,250,0.15);  color: #60a5fa; }
.b-gray   { background: rgba(100,116,139,0.2);  color: #94a3b8; }
.b-moon   { background: rgba(127,216,235,0.15); color: #7fd8eb; }

/* ── Status select ── */
.status-sel {
  background: transparent; border: 1px solid var(--border2);
  border-radius: 6px; padding: 4px 8px;
  color: var(--text); font-family: var(--font); font-size: 12px; cursor: pointer;
}

/* ── Avatar ── */
.av {
  width: 30px; height: 30px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}

/* ── Severity dot ── */
.sev { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink:0; }
.sev-high   { background: var(--red); }
.sev-medium { background: var(--yellow); }
.sev-low    { background: var(--blue); }

/* ── Detail drawer ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  display: none; justify-content: flex-end; z-index: 100;
}
.overlay.open { display: flex; }
.drawer {
  width: 420px; max-width: 96vw;
  background: var(--surface); border-left: 1px solid var(--border2);
  display: flex; flex-direction: column;
  animation: slideIn .2s ease;
}
@keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.drawer-head {
  padding: 20px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.drawer-body { flex: 1; overflow-y: auto; padding: 20px 22px; }
.close-btn {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--card); border: none;
  color: var(--muted); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
}
.close-btn:hover { color: var(--text); }

.detail-field { margin-bottom: 16px; }
.detail-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.detail-val { font-size: 13px; color: var(--text); line-height: 1.6; }

.action-row { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 10px; padding: 12px 18px;
  font-size: 13px; display: flex; align-items: center; gap: 8px;
  transform: translateY(60px); opacity: 0;
  transition: all .25s; pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }

/* ── Empty ── */
.empty { text-align: center; padding: 52px; color: var(--muted); }
.empty-icon { font-size: 32px; margin-bottom: 10px; }

/* ── Last-updated ── */
#last-updated { font-size: 11px; color: var(--muted); font-family: var(--mono); }
</style>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <div class="brand">
    <div class="brand-dot">💙</div>
    <div class="brand-name">Heal<span>Jai</span> Admin</div>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><span class="live-dot"></span> Live</div>
    <span id="last-updated">—</span>
    <button class="btn" onclick="fetchReports()">↻ Refresh</button>
  </div>
</header>

<div class="wrap">

  <!-- Stats -->
  <div class="stats">
    <div class="stat s-red">
      <div class="stat-label">รายงานทั้งหมด</div>
      <div class="stat-val c-red" id="s-total">—</div>
      <div class="stat-sub">ทุกสถานะรวมกัน</div>
    </div>
    <div class="stat s-yellow">
      <div class="stat-label">รอตรวจสอบ</div>
      <div class="stat-val c-yellow" id="s-pending">—</div>
      <div class="stat-sub">ต้องดำเนินการ</div>
    </div>
    <div class="stat s-blue">
      <div class="stat-label">ผู้ถูกรายงาน</div>
      <div class="stat-val c-blue" id="s-users">—</div>
      <div class="stat-sub">บัญชีไม่ซ้ำ</div>
    </div>
    <div class="stat s-green">
      <div class="stat-label">จัดการแล้ว</div>
      <div class="stat-val c-green" id="s-resolved">—</div>
      <div class="stat-sub">resolved + dismissed</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="search-box">
      <span style="color:var(--muted);font-size:15px">⌕</span>
      <input type="text" id="q" placeholder="ค้นหา user, รายละเอียด..." oninput="renderTable()">
    </div>
    <select id="f-type" onchange="renderTable()">
      <option value="">ประเภททั้งหมด</option>
      <option>คำพูดเกลียดชัง</option>
      <option>การคุกคาม</option>
      <option>สแปม</option>
      <option>เนื้อหาไม่เหมาะสม</option>
      <option>หลอกลวง</option>
      <option>อื่นๆ</option>
    </select>
    <select id="f-status" onchange="renderTable()">
      <option value="">สถานะทั้งหมด</option>
      <option value="pending">รอตรวจสอบ</option>
      <option value="reviewing">กำลังตรวจสอบ</option>
      <option value="resolved">จัดการแล้ว</option>
      <option value="dismissed">ยกเลิก</option>
    </select>
    <select id="f-sev" onchange="renderTable()">
      <option value="">ความรุนแรงทั้งหมด</option>
      <option value="high">🔴 สูง</option>
      <option value="medium">🟠 กลาง</option>
      <option value="low">🟡 ต่ำ</option>
    </select>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-head">
      <span class="table-title">รายการรายงาน</span>
      <span class="count-badge" id="row-count">0 รายการ</span>
    </div>
    <table>
      <thead><tr>
        <th>เวลา</th>
        <th>ผู้ถูกรายงาน</th>
        <th>ประเภท</th>
        <th>รายละเอียด</th>
        <th>ความรุนแรง</th>
        <th>สถานะ</th>
        <th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div><!-- /wrap -->

<!-- Drawer -->
<div class="overlay" id="overlay" onclick="closeDrawer(event)">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-head">
      <div>
        <div style="font-size:15px;font-weight:700" id="d-title">รายละเอียดรายงาน</div>
        <div style="font-size:12px;color:var(--muted)" id="d-sub"></div>
      </div>
      <button class="close-btn" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="d-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"><span id="t-icon"></span><span id="t-msg"></span></div>

<script>
// ============================================================
//  CONFIG — เปลี่ยน API_BASE ให้ตรงกับ backend จริง
//  ถ้ายังไม่มี API ให้ปล่อย '' ระบบจะใช้ mock data อัตโนมัติ
// ============================================================
const API_BASE = '';   // e.g. 'https://api.healjai.com'
const API_TOKEN = '';  // Bearer token ของ admin (ถ้า backend ต้องการ)
const POLL_MS = 30000; // auto-refresh ทุก 30 วินาที

// ============================================================
//  MOCK DATA — ลบออกเมื่อ connect API จริงแล้ว
// ============================================================
const MOCK = [
  { id:'r001', reporterId:'user_moon_11', reportedId:'user_sun_99', reportedName:'ดาวดาว',
    type:'คำพูดเกลียดชัง', description:'ส่งข้อความด่าซ้ำๆ หลายครั้งขณะที่ฉันเล่าเรื่องส่วนตัว',
    severity:'high', roomId:'room_abc123', status:'pending', createdAt: Date.now()-5*60000 },
  { id:'r002', reporterId:'user_star_42', reportedId:'user_cloud_7', reportedName:'เมฆขาว',
    type:'สแปม', description:'ส่งลิงก์โฆษณาซ้ำ 15 ครั้งใน 5 นาที',
    severity:'medium', roomId:'room_def456', status:'pending', createdAt: Date.now()-18*60000 },
  { id:'r003', reporterId:'user_sky_88', reportedId:'user_sun_99', reportedName:'ดาวดาว',
    type:'การคุกคาม', description:'ส่ง DM ข่มขู่หลังจากออกจากห้องแชท',
    severity:'high', roomId:'room_ghi789', status:'reviewing', createdAt: Date.now()-2*3600000 },
  { id:'r004', reporterId:'user_rain_3', reportedId:'user_mist_55', reportedName:'หมอกจาง',
    type:'เนื้อหาไม่เหมาะสม', description:'แชร์รูปไม่เหมาะสมในห้องสนทนาทั่วไป',
    severity:'high', roomId:'room_jkl012', status:'resolved', createdAt: Date.now()-5*3600000 },
  { id:'r005', reporterId:'user_leaf_20', reportedId:'user_wind_34', reportedName:'ลมพัด',
    type:'หลอกลวง', description:'แอบอ้างว่าเป็นนักจิตวิทยาเพื่อขอข้อมูลส่วนตัว',
    severity:'high', roomId:'room_mno345', status:'pending', createdAt: Date.now()-8*3600000 },
  { id:'r006', reporterId:'user_fire_66', reportedId:'user_ice_12', reportedName:'น้ำแข็ง',
    type:'อื่นๆ', description:'ตัดบทสนทนาและด่าทอกะทันหันโดยไม่มีสาเหตุ',
    severity:'low', roomId:'room_pqr678', status:'dismissed', createdAt: Date.now()-24*3600000 },
];

let reports = [];
let activeId = null;

// ============================================================
//  API LAYER — สลับระหว่าง mock กับ real API
// ============================================================
async function fetchReports() {
  if (!API_BASE) {
    // ใช้ mock
    reports = MOCK;
    afterFetch();
    return;
  }
  try {
    const headers = { 'Content-Type': 'application/json' };
    if (API_TOKEN) headers['Authorization'] = 'Bearer ' + API_TOKEN;
    const res = await fetch(`${API_BASE}/api/reports?limit=200`, { headers });
    if (!res.ok) throw new Error(res.status);
    const json = await res.json();
    // รองรับทั้ง { data: [...] } และ [...]
    reports = Array.isArray(json) ? json : (json.data || []);
    afterFetch();
  } catch (e) {
    toast('⚠️', 'โหลดข้อมูลไม่ได้ (' + e.message + ')');
  }
}

async function patchStatus(id, status) {
  if (!API_BASE) {
    // อัปเดต mock
    const r = reports.find(r => r.id === id);
    if (r) r.status = status;
    afterFetch();
    return true;
  }
  try {
    const headers = { 'Content-Type': 'application/json' };
    if (API_TOKEN) headers['Authorization'] = 'Bearer ' + API_TOKEN;
    const res = await fetch(`${API_BASE}/api/reports/${id}/status`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify({ status }),
    });
    if (!res.ok) throw new Error(res.status);
    const r = reports.find(r => r.id === id);
    if (r) r.status = status;
    afterFetch();
    return true;
  } catch (e) {
    toast('❌', 'อัปเดตสถานะไม่ได้ (' + e.message + ')');
    return false;
  }
}

// ============================================================
//  AFTER FETCH
// ============================================================
function afterFetch() {
  updateStats();
  renderTable();
  document.getElementById('last-updated').textContent =
    new Date().toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

// ============================================================
//  STATS
// ============================================================
function updateStats() {
  document.getElementById('s-total').textContent   = reports.length;
  document.getElementById('s-pending').textContent = reports.filter(r => r.status === 'pending').length;
  document.getElementById('s-users').textContent   = new Set(reports.map(r => r.reportedId || r.reportedName)).size;
  document.getElementById('s-resolved').textContent =
    reports.filter(r => r.status === 'resolved' || r.status === 'dismissed').length;
}

// ============================================================
//  TABLE RENDER
// ============================================================
const TYPE_BADGE = {
  'คำพูดเกลียดชัง': 'b-red',
  'การคุกคาม':       'b-red',
  'สแปม':            'b-gray',
  'เนื้อหาไม่เหมาะสม': 'b-red',
  'หลอกลวง':         'b-yellow',
  'อื่นๆ':            'b-gray',
};
const STATUS_LABEL = {
  pending:   ['รอตรวจสอบ',    'b-yellow'],
  reviewing: ['กำลังตรวจสอบ', 'b-blue'],
  resolved:  ['จัดการแล้ว',   'b-green'],
  dismissed: ['ยกเลิก',       'b-gray'],
};
const SEV_LABEL = { high:'🔴 สูง', medium:'🟠 กลาง', low:'🟡 ต่ำ' };

function avColor(str = '') {
  const p = ['#fd7d7e','#fbbf24','#34d399','#60a5fa','#a78bfa','#7fd8eb','#fe9526'];
  let h = 0; for (const c of str) h += c.charCodeAt(0);
  return p[h % p.length];
}
function initials(str = '') { return (str || '?').slice(0,2).toUpperCase(); }

function timeAgo(ts) {
  const s = (Date.now() - ts) / 1000;
  if (s < 60)   return 'เมื่อกี้';
  if (s < 3600) return Math.floor(s/60) + ' นาทีที่แล้ว';
  if (s < 86400)return Math.floor(s/3600) + ' ชม.ที่แล้ว';
  return Math.floor(s/86400) + ' วันที่แล้ว';
}
function fmtTs(ts) {
  return new Date(ts).toLocaleString('th-TH', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function renderTable() {
  const q    = document.getElementById('q').value.toLowerCase();
  const ftyp = document.getElementById('f-type').value;
  const fst  = document.getElementById('f-status').value;
  const fsev = document.getElementById('f-sev').value;

  const rows = reports
    .filter(r => {
      const name = (r.reportedName || r.reportedId || '').toLowerCase();
      const desc = (r.description || '').toLowerCase();
      return (!q   || name.includes(q) || desc.includes(q))
          && (!ftyp || r.type === ftyp)
          && (!fst  || r.status === fst)
          && (!fsev || r.severity === fsev);
    })
    .sort((a, b) => {
      // pending ขึ้นก่อน แล้วเรียงเวลา
      if (a.status === 'pending' && b.status !== 'pending') return -1;
      if (b.status === 'pending' && a.status !== 'pending') return 1;
      return (b.createdAt||0) - (a.createdAt||0);
    });

  document.getElementById('row-count').textContent = rows.length + ' รายการ';

  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty">
      <div class="empty-icon">📭</div>ไม่พบรายงาน</div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const [slabel, sclass] = STATUS_LABEL[r.status] || ['?', 'b-gray'];
    const name = r.reportedName || r.reportedId || '?';
    const descTrim = (r.description||'').length > 52
      ? r.description.slice(0,52) + '…' : (r.description || '—');
    return `<tr>
      <td style="color:var(--muted);font-family:var(--mono);font-size:11px;white-space:nowrap">${timeAgo(r.createdAt||r.ts||Date.now())}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="av" style="background:${avColor(name)};color:#fff">${initials(name)}</div>
          <span style="font-weight:600">${name}</span>
        </div>
      </td>
      <td><span class="badge ${TYPE_BADGE[r.type]||'b-gray'}">${r.type||'—'}</span></td>
      <td style="color:var(--muted);max-width:220px">${descTrim}</td>
      <td>${SEV_LABEL[r.severity]||'—'}</td>
      <td>
        <select class="status-sel" onchange="changeStatus('${r.id}',this.value)">
          ${['pending','reviewing','resolved','dismissed'].map(s =>
            `<option value="${s}" ${r.status===s?'selected':''}>${STATUS_LABEL[s][0]}</option>`
          ).join('')}
        </select>
      </td>
      <td>
        <button class="btn" style="padding:5px 12px;font-size:12px" onclick="openDrawer('${r.id}')">ดู →</button>
      </td>
    </tr>`;
  }).join('');
}

// ============================================================
//  STATUS CHANGE
// ============================================================
async function changeStatus(id, status) {
  const ok = await patchStatus(id, status);
  if (ok) {
    toast('✅', 'อัปเดตสถานะแล้ว');
    if (activeId === id) openDrawer(id); // refresh drawer
  }
}

// ============================================================
//  DRAWER
// ============================================================
function openDrawer(id) {
  const r = reports.find(r => r.id === id);
  if (!r) return;
  activeId = id;
  const name = r.reportedName || r.reportedId || '?';
  const [slabel, sclass] = STATUS_LABEL[r.status] || ['?','b-gray'];

  document.getElementById('d-title').textContent = `รายงาน: ${name}`;
  document.getElementById('d-sub').innerHTML =
    `<span class="badge ${sclass}" style="font-size:10px">${slabel}</span>`;

  document.getElementById('d-body').innerHTML = `
    <div class="detail-field">
      <div class="detail-label">ผู้ถูกรายงาน</div>
      <div class="detail-val" style="display:flex;align-items:center;gap:8px">
        <div class="av" style="background:${avColor(name)};color:#fff;width:26px;height:26px;font-size:10px">${initials(name)}</div>
        <span style="font-weight:600">${name}</span>
        <span style="color:var(--muted);font-size:12px">${r.reportedId||''}</span>
      </div>
    </div>
    <div class="detail-field">
      <div class="detail-label">ประเภทการละเมิด</div>
      <div class="detail-val"><span class="badge ${TYPE_BADGE[r.type]||'b-gray'}">${r.type||'—'}</span></div>
    </div>
    <div class="detail-field">
      <div class="detail-label">ความรุนแรง</div>
      <div class="detail-val">${SEV_LABEL[r.severity]||'—'}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">รายละเอียด</div>
      <div class="detail-val" style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:12px;line-height:1.7">${r.description||'—'}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">ห้องแชท (Room ID)</div>
      <div class="detail-val" style="font-family:var(--mono);font-size:12px;color:var(--muted)">${r.roomId||'—'}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">ผู้รายงาน</div>
      <div class="detail-val" style="font-family:var(--mono);font-size:12px;color:var(--muted)">${r.reporterId||'—'}</div>
    </div>
    <div class="detail-field">
      <div class="detail-label">เวลา</div>
      <div class="detail-val" style="font-family:var(--mono);font-size:12px">${fmtTs(r.createdAt||r.ts||Date.now())}</div>
    </div>
    <div class="action-row">
      <button class="btn" onclick="changeStatus('${r.id}','reviewing')" ${r.status==='reviewing'?'disabled':''}>🔍 กำลังตรวจสอบ</button>
      <button class="btn b-green" style="background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.3);color:var(--green)" onclick="changeStatus('${r.id}','resolved')" ${r.status==='resolved'?'disabled':''}>✅ จัดการแล้ว</button>
      <button class="btn b-gray" style="background:rgba(100,116,139,0.1);color:var(--muted)" onclick="changeStatus('${r.id}','dismissed')" ${r.status==='dismissed'?'disabled':''}>🚫 ยกเลิก</button>
    </div>`;

  document.getElementById('overlay').classList.add('open');
}

function closeDrawer(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
    activeId = null;
  }
}

// ============================================================
//  TOAST
// ============================================================
function toast(icon, msg) {
  const el = document.getElementById('toast');
  document.getElementById('t-icon').textContent = icon;
  document.getElementById('t-msg').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

// ============================================================
//  INIT + AUTO POLL
// ============================================================
fetchReports();
setInterval(fetchReports, POLL_MS);
</script>
</body>
</html>
