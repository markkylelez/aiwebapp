<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>HealJai Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo-box">
            <img src="../img/app_icon.png" class="main-logo" alt="Logo">
            <h3>Heal<span>Jai</span> Admin</h3>
        </div>
        <nav>
            <button onclick="switchPage('all')" id="btn-all" class="menu-btn active">📊 ทั้งหมด</button>
            <button onclick="switchPage('Chat')" id="btn-Chat" class="menu-btn">💬 ห้องแชท (Chat)</button>
            <button onclick="switchPage('Post')" id="btn-Post" class="menu-btn">📝 โพสต์ (Post)</button>
        </nav>
        <div class="footer">
            <small id="last-update">Update: --:--</small>
        </div>
    </aside>

    <main class="content">
        <h2 id="title">รายงานทั้งหมด</h2>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>เวลา</th>
                        <th>ประเภทปัญหา</th>
                        <th style="text-align: right;">การจัดการ</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </main>

    <div id="drawer" class="overlay" onclick="closeDrawer()">
        <div class="drawer-box" onclick="event.stopPropagation()">
            <div class="drawer-head">
                <h3>ตรวจสอบรายละเอียด</h3>
                <button onclick="closeDrawer()">✕</button>
            </div>
            <div id="drawer-content" class="drawer-body"></div>
        </div>
    </div>

    <div id="toast">แจ้งเตือนระบบ</div>

    <script src="script.js"></script>
</body>
</html>
