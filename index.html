<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>น้องฮีลใจ AI Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
        rel="stylesheet">

    <style>
        :root {
            /* ถอดตัวแปรสีพื้นหลังเดิมออกเพราะเราจะใช้รูปแทน */
            --primary-green: #82B96D;
            --light-green: #E9F1D7;
            --ai-blue: #CDE1F9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Kanit', sans-serif;
            height: 100vh;
            overflow: hidden;
            background-image: url('../img/app_bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- AI Pulse Logo Area --- */
        .ai-container {
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .pulse-ring {
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            display: none;
        }

        .pulse-ring.active {
            display: block;
            animation: pulse-anim 1.5s infinite ease-out;
        }

        @keyframes pulse-anim {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        .main-logo {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 0 30px rgba(179, 229, 252, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: transform 0.3s ease;
            overflow: hidden;
        }

        .main-logo.typing {
            animation: breathe 1.5s infinite ease-in-out;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }
        }

        .main-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* --- Chat Sheet Area --- */
        .chat-sheet {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 45vh;
            background: rgba(255, 248, 238, 0.9);
            /* เพิ่มความโปร่งใสเล็กน้อยให้เห็นพื้นหลังลางๆ */
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .handle {
            width: 55px;
            height: 5px;
            background: var(--ai-blue);
            border-radius: 10px;
            margin: 12px auto;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
        }

        .bubble {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 15px;
            margin-bottom: 12px;
            font-size: 16px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .bubble.ai {
            background: var(--light-green);
            align-self: flex-start;
            border-radius: 15px 15px 15px 5px;
        }

        .bubble.me {
            background: var(--primary-green);
            color: white;
            align-self: flex-end;
            border-radius: 15px 15px 5px 15px;
        }

        /* --- Typing Indicator --- */
        .typing-container {
            padding: 0 20px 10px 20px;
            display: none;
            align-items: center;
        }

        .typing-bubble {
            background-color: #E9F1D7;
            color: #888;
            font-size: 13px;
            padding: 8px 15px;
            border-radius: 15px 15px 15px 5px;
            border: 1px solid #d0dcb7;
        }

        .dots {
            display: inline-block;
            animation: wave 1.3s infinite;
        }

        @keyframes wave {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-2px);
            }
        }

        /* --- Input Bar & Transparent Button --- */
        .input-bar {
            padding: 10px 20px 30px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: transparent;
            /* ทำให้พื้นหลังส่วน input โปร่งใส */
        }

        input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 25px;
            border: 1px solid #eee;
            outline: none;
            font-family: 'Kanit', sans-serif;
            font-size: 16px;
            background-color: white;
            /* ใส่พื้นหลังสีขาวให้ช่อง input */
        }

        button {
            background: transparent;
            border: none;
            color: var(--primary-green);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.85);
            background: rgba(130, 185, 109, 0.1);
        }

        .material-symbols-rounded {
            font-size: 32px;
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body>

    <div class="ai-container">
        <div id="ring" class="pulse-ring"></div>
        <div id="logo" class="main-logo">
            <img src="../img/app_icon.png" alt="Logo">
        </div>
    </div>

    <div class="chat-sheet">
        <div class="handle"></div>
        <div class="messages-container" id="chat-box">
            <div class="bubble ai">สวัสดีครับมาร์ค! วันนี้มีเรื่องอะไรไม่สบายใจไหม?</div>
        </div>

        <div id="typing-container" class="typing-container">
            <div class="typing-bubble">
                กำลังพิมพ์<span class="dots">...</span>
            </div>
        </div>

        <div class="input-bar">
            <input type="text" id="user-input" placeholder="พิมพ์คุยกับ น้องฮีลใจ..." autocomplete="off">
            <button onclick="sendMessage()">
                <span class="material-symbols-rounded">send</span>
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const ring = document.getElementById('ring');
        const logo = document.getElementById('logo');
        const typingContainer = document.getElementById('typing-container');

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendBubble(text, 'me');
            userInput.value = '';

            startAiEffect();

            setTimeout(() => {
                stopAiEffect();
                appendBubble("เรารับฟังอยู่เสมอนะ มีอะไรระบายออกมาได้เลย", 'ai');
            }, 2000);
        }

        function appendBubble(text, side) {
            const div = document.createElement('div');
            div.className = `bubble ${side}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function startAiEffect() {
            ring.classList.add('active');
            logo.classList.add('typing');
            typingContainer.style.display = 'flex';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function stopAiEffect() {
            ring.classList.remove('active');
            logo.classList.remove('typing');
            typingContainer.style.display = 'none';
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
